<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorização de Conteúdo — Thiago Badaró</title>
  <meta name="description" content="Mapa mental de Categorização de Conteúdo — Os 3 Níveis, Os 3 Tipos, Proporções e Produção.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primaria: #1A2E4A;
      --primaria-escura: #0F1D33;
      --acento: #B08D57;
      --acento-claro: #D9B97F;
      --texto-claro: #F5F4F0;
      --texto-suave: #C8CEDA;
      --borda: rgba(176, 141, 87, 0.28);
      --c1: #5B9BD5;
      --c2: #6EB87A;
      --c3: #D98A4A;
      --c4: #A97AB5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--texto-claro);
      background:
        radial-gradient(900px 500px at 50% -80px, rgba(176,141,87,0.14), transparent 60%),
        linear-gradient(180deg, var(--primaria-escura) 0%, var(--primaria) 55%, var(--primaria-escura) 100%);
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      padding: 40px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--borda);
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 24px;
      top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--acento-claro);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.22s;
    }

    .back-btn:hover {
      border-color: var(--acento);
      background: rgba(176,141,87,0.08);
    }

    .header-eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--acento-claro);
      margin-bottom: 12px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--texto-claro);
      margin-bottom: 10px;
    }

    .header-hint {
      font-size: 0.8rem;
      color: var(--texto-suave);
    }

    /* ── Controls ── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 24px;
      flex-wrap: wrap;
    }

    .btn-ctrl {
      background: rgba(176,141,87,0.1);
      border: 1px solid var(--borda);
      color: var(--acento-claro);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-ctrl:hover {
      background: rgba(176,141,87,0.18);
      border-color: var(--acento);
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0 24px 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.75rem;
      color: var(--texto-suave);
      letter-spacing: 0.04em;
    }

    .legend-pip {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    /* ── Root node ── */
    .root-wrap {
      text-align: center;
      padding: 8px 24px 32px;
    }

    .root-node {
      display: inline-block;
      background: linear-gradient(135deg, #8A6B35 0%, var(--acento-claro) 50%, #8A6B35 100%);
      color: #0F1D33;
      padding: 16px 44px;
      border-radius: 50px;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow:
        0 0 0 6px rgba(176,141,87,0.12),
        0 12px 36px rgba(0,0,0,0.4);
    }

    /* ── Grid ── */
    .branches-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 0 24px 64px;
      max-width: 1080px;
      margin: 0 auto;
    }

    @media (max-width: 660px) {
      .branches-grid { grid-template-columns: 1fr; }
      .back-btn { position: static; margin-bottom: 16px; display: inline-flex; }
      .page-header { padding-top: 24px; }
      .header-title { font-size: 1.6rem; }
    }

    /* ── Branch card ── */
    .branch-card {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--borda);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.25s;
    }

    .branch-card.open {
      border-color: rgba(176,141,87,0.45);
    }

    .branch-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .branch-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(176,141,87,0.07), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .branch-header:hover::before { opacity: 1; }

    .branch-card.open .branch-header {
      border-bottom-color: var(--borda);
    }

    .branch-accent {
      width: 4px;
      border-radius: 4px;
      align-self: stretch;
      flex-shrink: 0;
    }

    .branch-title-wrap { flex: 1; }

    .branch-num {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .branch-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .branch-chevron {
      font-size: 1.3rem;
      line-height: 1;
      transition: transform 0.28s ease;
      color: var(--acento-claro);
    }

    .branch-card.open .branch-chevron { transform: rotate(90deg); }

    .branch-body {
      display: none;
      padding: 12px 0 8px;
    }

    .branch-card.open .branch-body { display: block; }

    /* ── Tree ── */
    .tree-node { }

    .tree-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .tree-row.leaf { cursor: default; }
    .tree-row:hover:not(.leaf) { background: rgba(255,255,255,0.04); }

    .tree-connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .tree-pip {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tree-pip.parent {
      background: transparent;
      border: 1.5px solid currentColor;
    }

    .tree-label {
      font-size: 0.84rem;
      line-height: 1.5;
      color: var(--texto-suave);
      flex: 1;
    }

    .tree-label.d0 {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--texto-claro);
    }

    .tree-caret {
      font-size: 0.8rem;
      line-height: 1;
      padding-top: 4px;
      flex-shrink: 0;
      color: var(--acento-claro);
      opacity: 0.7;
      transition: transform 0.2s;
    }

    .tree-node.open > .tree-row > .tree-caret { transform: rotate(90deg); }

    .tree-children { display: none; }
    .tree-node.open > .tree-children { display: block; }
  </style>
</head>

  let nodeCounter = 0;

  function buildTree(nodes, depth, color) {
    return nodes.map(n => {
      const id = 'n' + (nodeCounter++);
      const hasC = n.c && n.c.length > 0;
      const indent = depth * 18;
      return `
        <div class="tree-node" id="${id}">
          <div class="tree-row ${hasC ? '' : 'leaf'}" style="padding-left:${16 + indent}px" ${hasC ? `onclick="tog('${id}')"` : ''}>
            <div class="tree-pip ${hasC ? 'parent' : ''}" style="color:${color};${hasC ? '' : `background:${color};opacity:${Math.max(0.4, 1 - depth * 0.18)}`};margin-top:6px;flex-shrink:0;width:${hasC?8:6}px;height:${hasC?8:6}px;border-radius:50%"></div>
            <span class="tree-label ${depth === 0 ? 'd0' : ''}" style="padding-left:8px">${n.t}</span>
            ${hasC ? `<span class="tree-caret" style="color:${color}">›</span>` : ''}
          </div>
          ${hasC ? `<div class="tree-children">${buildTree(n.c, depth + 1, color)}</div>` : ''}
        </div>`;
    }).join('');
  }

  function tog(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function expandAll() {
    document.querySelectorAll('.tree-node, .branch-card').forEach(el => el.classList.add('open'));
  }

  function collapseAll() {
    document.querySelectorAll('.tree-node, .branch-card').forEach(el => el.classList.remove('open'));
  }

        </div>
        <span class="branch-chevron">›</span>
      </div>
      <div class="branch-body">${buildTree(b.children, 0, b.color)}</div>
    </div>
  `).join('');
  </script>
</body>
</html>
